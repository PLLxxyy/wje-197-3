<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>像素画编辑器</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #1e1e2e; color: #cdd6f4; font-size: 13px; }

    .app { display: flex; flex-direction: column; height: 100%; }

    /* TopBar */
    .topbar { display: flex; align-items: center; height: 44px; background: #181825; border-bottom: 1px solid #313244; padding: 0 12px; gap: 10px; flex-shrink: 0; }
    .topbar .logo { font-weight: 700; font-size: 14px; color: #cba6f7; white-space: nowrap; }
    .topbar .sep { width: 1px; height: 24px; background: #313244; }
    .topbar label { font-size: 12px; color: #a6adc8; white-space: nowrap; }
    .topbar select, .topbar input[type="number"] { background: #313244; color: #cdd6f4; border: 1px solid #45475a; border-radius: 4px; padding: 4px 6px; font-size: 12px; outline: none; }
    .topbar select:focus, .topbar input:focus { border-color: #cba6f7; }
    .topbar input[type="number"] { width: 56px; }
    .topbar button { background: #313244; color: #cdd6f4; border: 1px solid #45475a; border-radius: 4px; padding: 5px 10px; font-size: 12px; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
    .topbar button:hover { background: #45475a; }
    .topbar button:active { background: #585b70; }
    .topbar button.active { background: #cba6f7; color: #1e1e2e; border-color: #cba6f7; }
    .topbar button:disabled { opacity: 0.4; cursor: default; }
    .topbar .spacer { flex: 1; }
    .topbar .group { display: flex; align-items: center; gap: 6px; }

    /* Main layout */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* Left Panel - Color */
    .panel-left { width: 180px; background: #181825; border-right: 1px solid #313244; display: flex; flex-direction: column; flex-shrink: 0; }
    .panel-section { padding: 10px; }
    .panel-section h3 { font-size: 12px; font-weight: 600; color: #a6adc8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .color-preview { display: flex; gap: 8px; margin-bottom: 10px; }
    .color-preview .swatch { width: 36px; height: 36px; border-radius: 6px; border: 2px solid #45475a; cursor: pointer; position: relative; }
    .color-preview .swatch.active { border-color: #cba6f7; }
    .color-preview .swatch .label { font-size: 9px; text-align: center; margin-top: 2px; color: #6c7086; }
    .color-input { width: 100%; height: 32px; border: none; border-radius: 4px; cursor: pointer; background: none; padding: 0; }
    .color-hex { width: 100%; background: #313244; border: 1px solid #45475a; border-radius: 4px; color: #cdd6f4; padding: 5px 8px; font-size: 12px; font-family: monospace; margin-top: 6px; outline: none; }
    .color-hex:focus { border-color: #cba6f7; }
    .palette-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 3px; }
    .palette-color { width: 100%; aspect-ratio: 1; border-radius: 3px; cursor: pointer; border: 2px solid transparent; transition: border-color 0.1s, transform 0.1s; }
    .palette-color:hover { transform: scale(1.15); z-index: 1; }
    .palette-color.selected { border-color: #fff; box-shadow: 0 0 0 1px #1e1e2e; }
    .palette-custom { margin-top: 8px; }

    /* Center - Canvas area */
    .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; background: #11111b; position: relative; overflow: hidden; }
    .canvas-wrapper { position: relative; }
    .canvas-wrapper canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; cursor: crosshair; }
    .canvas-info { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); background: rgba(24,24,37,0.85); padding: 4px 10px; border-radius: 4px; font-size: 11px; color: #6c7086; pointer-events: none; white-space: nowrap; }

    /* Right Panel - Tools + Layers */
    .panel-right { width: 200px; background: #181825; border-left: 1px solid #313244; display: flex; flex-direction: column; flex-shrink: 0; }

    /* Tools */
    .tools-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; }
    .tool-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; background: #313244; border: 2px solid transparent; border-radius: 6px; padding: 8px 4px; cursor: pointer; color: #bac2de; font-size: 11px; transition: all 0.15s; min-height: 54px; }
    .tool-btn:hover { background: #45475a; }
    .tool-btn.active { background: #45475a; border-color: #cba6f7; color: #cba6f7; }
    .tool-btn .icon { font-size: 18px; line-height: 1; }
    .tool-btn .label { font-size: 10px; }

    /* Brush size */
    .brush-size { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .brush-size label { font-size: 11px; color: #a6adc8; white-space: nowrap; }
    .brush-size input[type="range"] { flex: 1; accent-color: #cba6f7; }
    .brush-size .val { font-size: 11px; color: #6c7086; min-width: 16px; text-align: right; }

    /* Layers */
    .layers-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-top: 1px solid #313244; }
    .layers-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; }
    .layers-header h3 { font-size: 12px; font-weight: 600; color: #a6adc8; text-transform: uppercase; letter-spacing: 0.5px; }
    .layers-actions { display: flex; gap: 3px; }
    .layers-actions button { background: #313244; border: none; border-radius: 4px; color: #cdd6f4; width: 24px; height: 24px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
    .layers-actions button:hover { background: #45475a; }
    .layers-list { flex: 1; overflow-y: auto; padding: 0 6px 6px; }
    .layers-list::-webkit-scrollbar { width: 4px; }
    .layers-list::-webkit-scrollbar-thumb { background: #45475a; border-radius: 2px; }
    .layer-item { display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: 5px; cursor: pointer; margin-bottom: 2px; transition: background 0.15s; border: 2px solid transparent; }
    .layer-item:hover { background: #313244; }
    .layer-item.active { background: #313244; border-color: #cba6f7; }
    .layer-thumb { width: 32px; height: 32px; border-radius: 3px; border: 1px solid #45475a; background-image: linear-gradient(45deg, #45475a 25%, transparent 25%), linear-gradient(-45deg, #45475a 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #45475a 75%), linear-gradient(-45deg, transparent 75%, #45475a 75%); background-size: 8px 8px; background-position: 0 0, 0 4px, 4px -4px, -4px 0px; flex-shrink: 0; image-rendering: pixelated; }
    .layer-info { flex: 1; min-width: 0; }
    .layer-name { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .layer-meta { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
    .layer-opacity { font-size: 10px; color: #6c7086; }
    .layer-opacity input { width: 50px; accent-color: #cba6f7; }
    .layer-controls { display: flex; gap: 2px; flex-shrink: 0; }
    .layer-controls button { background: none; border: none; color: #6c7086; cursor: pointer; font-size: 13px; padding: 2px; border-radius: 3px; transition: color 0.15s, background 0.15s; }
    .layer-controls button:hover { color: #cdd6f4; background: #45475a; }
    .layer-controls button.vis-off { color: #45475a; }

    /* Artworks modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: #1e1e2e; border: 1px solid #313244; border-radius: 10px; width: 520px; max-height: 80vh; display: flex; flex-direction: column; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid #313244; }
    .modal-header h2 { font-size: 15px; font-weight: 600; }
    .modal-close { background: none; border: none; color: #6c7086; font-size: 18px; cursor: pointer; padding: 4px; }
    .modal-close:hover { color: #cdd6f4; }
    .modal-body { flex: 1; overflow-y: auto; padding: 12px 16px; }
    .modal-body::-webkit-scrollbar { width: 4px; }
    .modal-body::-webkit-scrollbar-thumb { background: #45475a; border-radius: 2px; }
    .artwork-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .artwork-card { background: #313244; border-radius: 6px; padding: 8px; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; }
    .artwork-card:hover { border-color: #585b70; }
    .artwork-card .thumb { width: 100%; aspect-ratio: 1; border-radius: 4px; image-rendering: pixelated; background-image: linear-gradient(45deg, #45475a 25%, transparent 25%), linear-gradient(-45deg, #45475a 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #45475a 75%), linear-gradient(-45deg, transparent 75%, #45475a 75%); background-size: 8px 8px; background-position: 0 0, 0 4px, 4px -4px, -4px 0px; }
    .artwork-card .name { font-size: 11px; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .artwork-card .meta { font-size: 10px; color: #6c7086; margin-top: 2px; }
    .artwork-card .actions { display: flex; gap: 4px; margin-top: 6px; }
    .artwork-card .actions button { flex: 1; padding: 4px; font-size: 10px; border-radius: 3px; border: none; cursor: pointer; }
    .artwork-card .actions .btn-open { background: #cba6f7; color: #1e1e2e; }
    .artwork-card .actions .btn-open:hover { background: #b4befe; }
    .artwork-card .actions .btn-del { background: #45475a; color: #f38ba8; }
    .artwork-card .actions .btn-del:hover { background: #f38ba8; color: #1e1e2e; }
    .empty-msg { text-align: center; color: #6c7086; padding: 40px 0; font-size: 13px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
